$kind: collection
name: SoloSuccess - Briefcase & Files
description: |-
  API endpoints for managing briefcase items, files, and folders in the SoloSuccess AI application.
  
  ## Features
  - Briefcase item management
  - File upload and download
  - Folder organization
  - File sharing
variables:
  - key: baseUrl
    value: 'http://localhost:3000'
    description: Base URL for the API
  - key: itemId
    value: ''
    description: Briefcase item ID
  - key: fileId
    value: ''
    description: File ID
  - key: folderId
    value: ''
    description: Folder ID
