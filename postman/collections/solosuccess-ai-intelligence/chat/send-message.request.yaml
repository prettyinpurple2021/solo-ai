$kind: http-request
name: Send Message
method: POST
url: '{{baseUrl}}/api/chat/{{chatId}}/messages'
order: 4000
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: chatId
    value: ''
body:
  type: json
  content: |-
    {
      "content": "Analyze my top competitor and suggest strategies",
      "attachments": []
    }
