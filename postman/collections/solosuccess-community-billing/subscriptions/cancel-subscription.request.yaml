$kind: http-request
name: Cancel Subscription
method: POST
url: '{{baseUrl}}/api/subscriptions/{{subscriptionId}}/cancel'
order: 5000
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: subscriptionId
    value: ''
body:
  type: json
  content: |-
    {
      "reason": "switching-plans",
      "feedback": "Moving to a different plan",
      "cancelAtPeriodEnd": true
    }
