$kind: http-request
name: Create Subscription
method: POST
url: '{{baseUrl}}/api/subscriptions'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "planId": "pro-monthly",
      "paymentMethodId": "{{paymentMethodId}}",
      "couponCode": null
    }
