$kind: http-request
name: Update Profile
method: PATCH
url: '{{baseUrl}}/api/profile'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Updated Name",
      "bio": "Updated bio",
      "avatar": "https://example.com/avatar.jpg"
    }
