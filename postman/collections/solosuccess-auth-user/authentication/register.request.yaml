$kind: http-request
name: Register User
method: POST
url: '{{baseUrl}}/api/register'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "user@example.com",
      "password": "securePassword123",
      "name": "John Doe"
    }
