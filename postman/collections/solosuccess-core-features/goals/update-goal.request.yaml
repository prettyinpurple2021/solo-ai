$kind: http-request
name: Update Goal
method: PATCH
url: '{{baseUrl}}/api/goals/{{goalId}}'
order: 4000
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: goalId
    value: ''
body:
  type: json
  content: |-
    {
      "progress": 50,
      "status": "in_progress"
    }
