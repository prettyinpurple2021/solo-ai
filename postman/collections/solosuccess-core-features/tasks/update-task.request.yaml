$kind: http-request
name: Update Task
method: PATCH
url: '{{baseUrl}}/api/tasks/{{taskId}}'
order: 4000
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: taskId
    value: ''
body:
  type: json
  content: |-
    {
      "status": "completed",
      "completedAt": "2025-01-10T10:00:00Z"
    }
