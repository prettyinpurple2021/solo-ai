name: SoloSuccess-Production-Deploy
run-name: Shipping SoloSuccess AI to the Cloud 🚀
on:
  push:
    branches:
      - main # This tells Gitea: "Only run this when I save code to the main branch"
  # Manual run: repo → Actions → "SoloSuccess-Production-Deploy" → Run workflow (no commit needed).
  workflow_dispatch:

jobs:
  deploy-to-vercel:
    # Same `runs-on` as test-runner — see test-runner.yaml for why `ubuntu-latest` is used on Gitea act_runner.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install --global vercel

      - name: Pull Vercel Environment Information
        # This step connects your local runner to the Vercel cloud project
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: "team_08fevWvXfZL6nNdSQmcxlIaK"
          VERCEL_PROJECT_ID: "prj_dcQO7rZFCxxwHnxaorYGiyItkj8B"

      # Transient ECONNRESET to registry.npmjs.org is common on self-hosted runners; retry + longer npm timeouts.
      - name: Install Project Dependencies
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          attempt=1
          max=3
          while [ "$attempt" -le "$max" ]; do
            if npm ci; then
              exit 0
            fi
            echo "npm ci failed (attempt $attempt of $max) — registry/network blip; cleaning node_modules and retrying"
            rm -rf node_modules
            attempt=$((attempt + 1))
            sleep 25
          done
          exit 1

      - name: Validate code quality gates
        run: npm run validate

      - name: Run full test suite
        run: npm test -- --runInBand

      - name: Build Local Project for Vercel
        run: vercel build --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: "team_08fevWvXfZL6nNdSQmcxlIaK"
          VERCEL_PROJECT_ID: "prj_dcQO7rZFCxxwHnxaorYGiyItkj8B"

      - name: Deploy to Vercel Production
        # We remove .git to prevent Vercel CLI from associating the deploy with the git commit author
        # who may not be a verified member of the Vercel Team on the project settings.
        run: |
          rm -rf .git
          vercel deploy --prebuilt --prod --force --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: "team_08fevWvXfZL6nNdSQmcxlIaK"
          VERCEL_PROJECT_ID: "prj_dcQO7rZFCxxwHnxaorYGiyItkj8B"

      - name: Railway API via GitHub (CLI skipped)
        if: ${{ secrets.RAILWAY_USE_CLI_DEPLOY == 'false' || secrets.RAILWAY_USE_CLI_DEPLOY == '0' }}
        run: echo "RAILWAY_USE_CLI_DEPLOY is off — deploy the Express API from the GitHub mirror in Railway; see .gitea/README.md."

      - name: Install Railway CLI
        if: ${{ secrets.RAILWAY_USE_CLI_DEPLOY != 'false' && secrets.RAILWAY_USE_CLI_DEPLOY != '0' }}
        run: npm install -g @railway/cli

      # Deploy from job cwd (repo root). Do not pass `.` as PATH — Railway CLI then sets archive prefix to absolute cwd while walking `.`, and strip_prefix fails with "prefix not found".
      # server/Dockerfile + railway.toml need repo root context. Skips if secrets are unset — see .gitea/README.md.
      # If Railway already auto-deploys from a Git repo, do NOT add these secrets (avoid double deploys).
      - name: Deploy Express API to Railway
        if: ${{ secrets.RAILWAY_USE_CLI_DEPLOY != 'false' && secrets.RAILWAY_USE_CLI_DEPLOY != '0' }}
        env:
          # Set RAILWAY_USE_CLI_DEPLOY=false when the API deploys from GitHub (mirror) — avoids double deploy + CLI upload timeouts.
          RAILWAY_USE_CLI_DEPLOY: ${{ secrets.RAILWAY_USE_CLI_DEPLOY }}
          # Project deploy token uses RAILWAY_TOKEN; personal/account tokens often need RAILWAY_API_TOKEN (same secret value is fine).
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
        run: |
          set -e
          case "${RAILWAY_USE_CLI_DEPLOY}" in
            false|FALSE|0)
              echo "Skipping Railway CLI deploy: RAILWAY_USE_CLI_DEPLOY is disabled (API should deploy via GitHub mirror — see .gitea/README.md)."
              exit 0
              ;;
          esac
          if [ -z "${RAILWAY_TOKEN}" ] || [ -z "${RAILWAY_PROJECT_ID}" ] || [ -z "${RAILWAY_ENVIRONMENT}" ] || [ -z "${RAILWAY_SERVICE}" ]; then
            echo "Skipping Railway deploy: set Gitea repository secrets RAILWAY_TOKEN, RAILWAY_PROJECT_ID, RAILWAY_ENVIRONMENT, RAILWAY_SERVICE (see .gitea/README.md)."
            exit 0
          fi
          # Railway CLI hard-codes a ~30s HTTP timeout on upload; slow links need a small tarball (.railwayignore) + retries.
          attempt=1
          max=3
          while [ "$attempt" -le "$max" ]; do
            if railway up --ci \
              --project "${RAILWAY_PROJECT_ID}" \
              --environment "${RAILWAY_ENVIRONMENT}" \
              --service "${RAILWAY_SERVICE}"; then
              exit 0
            fi
            echo "railway up failed (attempt ${attempt} of ${max}) — network or upload timeout; retrying after backoff"
            attempt=$((attempt + 1))
            sleep 45
          done
          exit 1
