name: SoloSuccess-Verify-Connection
run-name: Testing Enchanted NightMare Infrastructure 🚀
on: [push]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Unit and integration tests
        run: npm test -- --runInBand

      - name: Production build
        run: npm run build