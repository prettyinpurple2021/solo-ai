services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: solosuccess-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: solosuccess
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solosuccess-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
    # depends_on:
      # postgres:
        # condition: service_healthy
    volumes:
      # Mount environment file to use all your Neon database and API keys
      - ./.env.production:/app/.env.production:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Gitea Service
  gitea:
    image: gitea/gitea:latest
    container_name: solosuccess-gitea
    restart: unless-stopped
    ports:
      - "3002:3000"
      - "2222:22"
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=postgres:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=gitea
      - GITEA__database__PASSWD=gitea_password
      - GITEA__server__ROOT_URL=http://localhost:3002/
      - GITEA__server__SSH_DOMAIN=localhost
      - GITEA__server__SSH_PORT=2222
    volumes:
      - gitea_data:/data
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
  gitea_data:
    driver: local
