name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Lint and type-check
        run: npm run validate

      - name: Test
        run: npm test -- --runInBand

  production-build:
    # Runs only on `push` to `main` to verify Next.js can build production bundles.
    # This avoids the extra time/cost on every PR while still catching build regressions
    # before releases.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Production build (next build --webpack)
        env:
          NODE_OPTIONS: --max-old-space-size=16384
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          CLIENT_URL: http://localhost:3000
        run: npx next build --webpack
